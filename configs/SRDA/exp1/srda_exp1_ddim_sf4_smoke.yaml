datasets:
  train_batch_size: 4
  valid_batch_size: 4
  test_batch_size: 4
  data_dir: /data/ddpm/external/hr_5000_simulations
  dataset_name: SrdaByDdpmDatasetScipy
  train_data_len: 64
  valid_data_len: 16
  omega_max: 14.015356
  omega_min: -14.146547
  scale_factor: 4
  obs_time_interval: 4
  obs_grid_interval: 8
  obs_noise_std: 0.1
  use_observation: true
  beta_dist_alpha: 2
  beta_dist_beta: 5
  use_mixup: true
  mixup_num: 32
  fill_missing_value: true
  missing_value: -1.1
  nx: 128
  ny: 64
  min_start_time_index: 0
  max_start_time_index: 96
  num_workers: 0
diffusion_model:
  beta_schedule:
    train:
      linear_end: 0.02
      linear_start: 0.0001
      n_timestep: 1000
      schedule: linear
    val:
      linear_end: 0.02
      linear_start: 0.0001
      n_timestep: 1000
      schedule: linear
      timestep_respacing:
      - 20
  diffusion:
    channels: 5
    conditional: true
    eta: 1
    image_size_x: 128
    image_size_y: 64
    loss_type: l1
  finetune_norm: false
  model_type: ddim
  phase: train
  unet:
    attn_res:
    - 8
    channel_multiplier:
    - 1
    - 2
    - 4
    - 8
    - 8
    dropout: 0.5
    in_channel: 10
    inner_channel: 64
    norm_groups: 32
    out_channel: 5
    res_blocks: 3
path:
  log: /work/SRDA/exp1_smoke/logs
  model: /saved_models/SRDA/exp1_smoke
train_diffusion_model:
  early_stopping_patience: 3
  num_epochs: 3
  optimizer:
    lr: 0.0001
    type: adam
  use_recon_loss: true
  val_freq: 1
train_logging:
  log_every_steps: 1
